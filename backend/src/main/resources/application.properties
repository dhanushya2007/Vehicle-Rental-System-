spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vehicle_rental}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:vehicleRentalSecretKey2024VeryLongSecretKeyForJWTSigning}
jwt.expiration=86400000

server.port=${PORT:8080}
spring.web.cors.allowed-origins=*
